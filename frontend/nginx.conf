# ---------------------------------------------------------------------------
# nginx config for the Message Gateway frontend.
#
# - SPA fallback: any unknown path serves index.html so the Angular router
#   can take over client-side.
# - `/api` is reverse-proxied to the `backend` service inside the
#   docker-compose network. In production this should be replaced by the
#   public API origin.
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed bundles emitted by `ng build --configuration production`.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the FastAPI backend.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
