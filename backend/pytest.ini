# ---------------------------------------------------------------------------
# Pytest configuration for the Message Gateway backend.
# ---------------------------------------------------------------------------

[pytest]
# Treat `app.*` and `tests.*` as import roots.
pythonpath = .
testpaths = tests
# We only ship fast unit tests for now; integration tests opt in explicitly.
# `--cov-fail-under` is the gate documented in CODING_STANDARDS.md and
# CONTRIBUTING.md: coverage below 80% on `app/` blocks PR merge. The
# `test_pytest_ini_enforces_coverage_gate` fixture test pins both the
# presence and the value of this flag.
addopts = -ra --strict-markers --cov=app --cov-report=term-missing --cov-fail-under=80
asyncio_mode = auto
